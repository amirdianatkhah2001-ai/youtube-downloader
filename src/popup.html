<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader Companion</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container">
    <h1>YouTube Downloader</h1>
    <p id="status">Checking current tab…</p>

    <section id="actions" class="hidden" aria-label="Download actions">
      <button data-format="mp4">Download Video (MP4)</button>
      <button data-format="mp3">Download Audio (MP3)</button>
    </section>

    <button id="open-options" class="secondary">Settings</button>
  </main>

  <script src="lib/downloader.js"></script>
  <script src="popup.js"></script>
</body>
</html>
